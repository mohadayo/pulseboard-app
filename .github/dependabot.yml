# Dependabot 設定
# 全マイクロサービスの依存パッケージを週次で監視する。

version: 2

updates:
  # api-gateway (Python)
  - package-ecosystem: "pip"
    directory: "/services/api-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(api-gateway)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "api-gateway"

  # dashboard-bff (Node.js / TypeScript)
  - package-ecosystem: "npm"
    directory: "/services/dashboard-bff"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(dashboard-bff)"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "dashboard-bff"

  # metrics-worker (Go)
  - package-ecosystem: "gomod"
    directory: "/services/metrics-worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(metrics-worker)"
      include: "scope"
    labels:
      - "dependencies"
      - "go"
      - "metrics-worker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker (各サービスの Dockerfile を監視)
  - package-ecosystem: "docker"
    directory: "/services/api-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(api-gateway)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/services/dashboard-bff"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(dashboard-bff)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/services/metrics-worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(metrics-worker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
