services:
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  metrics-worker:
    build: ./services/metrics-worker
    ports:
      - "${WORKER_PORT:-8001}:8001"
    environment:
      - PORT=8001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  dashboard-bff:
    build: ./services/dashboard-bff
    ports:
      - "${BFF_PORT:-8002}:8002"
    environment:
      - PORT=8002
      - API_GATEWAY_URL=http://api-gateway:8000
      - WORKER_URL=http://metrics-worker:8001
    depends_on:
      api-gateway:
        condition: service_healthy
      metrics-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
